appId: com.magiclens.app
productName: MagicLens
copyright: Copyright (c) MagicLens Magicorn contributors

directories:
  buildResources: build
  output: dist

files:
  - out/**/*
  - package.json
  - '!**/*.map'
  - '!**/*.ts'

asarUnpack:
  - '**/node_modules/node-pty/**'

# electron-updater reads this at runtime to know where to look for new releases.
publish:
  provider: github
  owner: magicorntech
  repo: magiclens
  releaseType: release

# Auto-update on macOS requires the app (and the downloaded update) to be code-signed.
# Set CSC_LINK / CSC_KEY_PASSWORD env vars in CI to enable signing + notarization.
# Without those, afterSign.js falls back to a free ad-hoc signature so the app can still
# launch on Apple Silicon (which refuses to run completely unsigned binaries).
afterSign: build/afterSign.js

mac:
  category: public.app-category.developer-tools
  icon: build/icon.png
  hardenedRuntime: true
  gatekeeperAssess: false
  target:
    - target: dmg
      arch: [x64, arm64]
    - target: zip
      arch: [x64, arm64]

dmg:
  writeUpdateInfo: true

win:
  icon: build/icon.png
  # NSIS produces a single installer .exe; add "msi" here too if a WiX toolchain is available in CI.
  target:
    - target: nsis
      arch: [x64]

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: always
  createStartMenuShortcut: true

linux:
  icon: build/icon.png
  category: Development
  target:
    - target: AppImage
      arch: [x64]
    - target: deb
      arch: [x64]

deb:
  depends:
    - libgtk-3-0
    - libnotify4
    - libnss3
    - libxss1
    - libxtst6
    - xdg-utils

npmRebuild: false
