name: magiclens

networks:
  magiclens:
    driver: bridge

volumes:
  postgres_data:
  redis_data:

services:
  # Default profile: infrastructure only (apps run on the host)
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-magiclens}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-magiclens}
      POSTGRES_DB: ${POSTGRES_DB:-magiclens}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - magiclens
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-magiclens} -d ${POSTGRES_DB:-magiclens}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    command: ["redis-server", "--appendonly", "yes"]
    networks:
      - magiclens
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  mailpit:
    image: axllent/mailpit:v1.21
    restart: unless-stopped
    ports:
      - "${MAILPIT_SMTP_PORT:-1025}:1025"
      - "${MAILPIT_UI_PORT:-8025}:8025"
    networks:
      - magiclens
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8025/api/v1/info"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  # Optional: docker compose --profile apps up -d
  api:
    profiles: ["apps"]
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      target: development
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-magiclens}:${POSTGRES_PASSWORD:-magiclens}@postgres:5432/${POSTGRES_DB:-magiclens}?schema=public
      REDIS_URL: redis://redis:6379
      SMTP_HOST: mailpit
      SMTP_PORT: 1025
      API_PORT: ${API_PORT:-3000}
      NODE_ENV: development
      SKIP_ELECTRON_REBUILD: "1"
    ports:
      - "${API_PORT:-3000}:3000"
    volumes:
      - ./apps/api/src:/app/apps/api/src
      - ./apps/api/package.json:/app/apps/api/package.json
      - ./apps/api/tsconfig.json:/app/apps/api/tsconfig.json
      - ./packages:/app/packages
      - ./docker/package.json:/app/package.json
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mailpit:
        condition: service_healthy
    networks:
      - magiclens
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 60s

  worker:
    profiles: ["apps"]
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
      target: development
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-magiclens}:${POSTGRES_PASSWORD:-magiclens}@postgres:5432/${POSTGRES_DB:-magiclens}?schema=public
      REDIS_URL: redis://redis:6379
      SMTP_HOST: mailpit
      SMTP_PORT: 1025
      NODE_ENV: development
      SKIP_ELECTRON_REBUILD: "1"
    volumes:
      - ./apps/worker/src:/app/apps/worker/src
      - ./apps/worker/package.json:/app/apps/worker/package.json
      - ./apps/worker/tsconfig.json:/app/apps/worker/tsconfig.json
      - ./packages:/app/packages
      - ./docker/package.json:/app/package.json
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mailpit:
        condition: service_healthy
    networks:
      - magiclens
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/health"]
      interval: 15s
      timeout: 5s
      retries: 12
      start_period: 60s

  admin:
    profiles: ["apps"]
    build:
      context: .
      dockerfile: apps/admin/Dockerfile
      target: development
    restart: unless-stopped
    environment:
      VITE_API_BASE_URL: http://localhost:${API_PORT:-3000}
      SKIP_ELECTRON_REBUILD: "1"
    ports:
      - "${ADMIN_PORT:-5173}:5173"
    volumes:
      - ./apps/admin/src:/app/apps/admin/src
      - ./apps/admin/index.html:/app/apps/admin/index.html
      - ./apps/admin/vite.config.ts:/app/apps/admin/vite.config.ts
      - ./apps/admin/package.json:/app/apps/admin/package.json
      - ./packages/shared-types:/app/packages/shared-types
    networks:
      - magiclens
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5173/"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 40s
